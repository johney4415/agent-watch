name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Package unsigned preview
        env:
          VERSION: ${{ github.ref_name }}
        run: ./scripts/package-release.sh "${VERSION#v}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: gh release create "$VERSION" "dist/Agent-Watch-${VERSION#v}.zip" --generate-notes --verify-tag
